<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korah | Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8faff;
      --text: #071126;
      --muted: #667085;
      --primary: #6d35f8;
      --primary-dark: #4f1fdb;
      --border: #e6eaf2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 70% 10%, rgba(109, 53, 248, .14), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .landing-placeholder {
      width: min(92vw, 720px);
      padding: 56px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 32px;
      background: rgba(255, 255, 255, .78);
      box-shadow: 0 24px 80px rgba(15, 23, 42, .08);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(109, 53, 248, .10);
      color: var(--primary);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 72px);
      line-height: .98;
      letter-spacing: -0.07em;
    }

    h1 span { color: var(--primary); }

    p {
      max-width: 560px;
      margin: 22px auto 34px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 26px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 14px 32px rgba(109, 53, 248, .28);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(109, 53, 248, .34);
    }
  </style>
</head>
<body>
  <main class="landing-placeholder">
    <div class="brand">
      <img src="assets/korah-logo-mark.png" alt="Korah" />
      <span>Korah</span>
    </div>

    <div class="eyebrow">Landing en construcción</div>

    <h1>Control total de tus <span>pagos</span></h1>

    <p>
      Esta será la nueva landing pública de Korah. Por ahora, entra a la app para iniciar sesión o crear tu cuenta.
    </p>

    <a class="button" href="app.html">Ir al login</a>
  </main>
</body>
</html>
